<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Floorplan Viewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #1e1e2e;
    --surface:  #2a2a3e;
    --border:   #3a3a5a;
    --text:     #cdd6f4;
    --muted:    #6c7086;
    --accent:   #89b4fa;
    --danger:   #f38ba8;
    --success:  #a6e3a1;
    --warn:     #f9e2af;
    --sidebar-w: 220px;
    --panel-w:   260px;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── toolbar ── */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  #toolbar h1 { font-size: 14px; font-weight: 600; color: var(--accent); margin-right: 8px; }

  .sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

  button {
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    font-size: 12px;
    transition: background .15s;
  }
  button:hover { background: var(--border); }
  button.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  button.primary:hover { opacity: .85; }
  button.danger { border-color: var(--danger); color: var(--danger); }
  button.danger:hover { background: var(--danger); color: var(--bg); }
  button:disabled { opacity: .35; cursor: not-allowed; }

  #status-bar {
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
    white-space: nowrap;
  }

  #zoom-display { font-size: 11px; color: var(--muted); min-width: 44px; text-align: center; }

  /* ── layout ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── left sidebar ── */
  #sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  #sidebar-header {
    padding: 8px 10px 6px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  #sidebar-header span { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }

  #elem-search {
    padding: 4px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-size: 12px;
    width: 100%;
  }

  #filter-row {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 2px 8px;
    font-size: 11px;
    border-radius: 10px;
  }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }

  #elem-list {
    overflow-y: auto;
    flex: 1;
  }

  .list-group-header {
    padding: 6px 10px 3px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
  }

  .list-item {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 5px 10px;
    cursor: pointer;
    transition: background .1s;
    border-left: 3px solid transparent;
  }
  .list-item:hover { background: rgba(255,255,255,.04); }
  .list-item.selected {
    background: rgba(137,180,250,.12);
    border-left-color: var(--accent);
  }

  .list-swatch {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,.15);
  }

  .list-label { font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .list-conf  { font-size: 10px; color: var(--muted); margin-left: auto; flex-shrink: 0; }

  /* ── center viewer ── */
  #viewer-wrap {
    flex: 1;
    overflow: hidden;
    position: relative;
    background: #111118;
    cursor: default;
  }

  #drop-zone {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    color: var(--muted);
    pointer-events: none;
    z-index: 5;
  }
  #drop-zone.hidden { display: none; }
  #drop-zone .icon { font-size: 48px; }
  #drop-zone p { font-size: 13px; }
  #drop-zone p span { color: var(--accent); }

  #canvas-container {
    position: absolute;
    transform-origin: 0 0;
    user-select: none;
  }

  #floorplan-img {
    display: block;
    image-rendering: pixelated;
  }

  #svg-overlay {
    position: absolute;
    top: 0; left: 0;
    overflow: visible;
  }

  #svg-overlay .elem-poly {
    fill-opacity: .18;
    stroke-width: 1.5;
    stroke-opacity: .85;
    cursor: pointer;
    transition: fill-opacity .1s;
  }
  #svg-overlay .elem-poly:hover { fill-opacity: .35; }
  #svg-overlay .elem-poly.selected { fill-opacity: .4; stroke-width: 2.5; }

  .handle {
    fill: white;
    stroke: var(--accent);
    stroke-width: 1.5;
    cursor: grab;
    r: 5;
  }
  .handle:active { cursor: grabbing; }

  /* ── right panel ── */
  #panel {
    width: var(--panel-w);
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  #panel-header {
    padding: 10px 12px 8px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--muted);
  }

  #panel-body {
    padding: 12px;
    overflow-y: auto;
    flex: 1;
  }

  #no-selection {
    color: var(--muted);
    font-size: 12px;
    text-align: center;
    margin-top: 40px;
  }

  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .field-value {
    font-size: 13px;
    font-weight: 500;
  }

  select, input[type="text"] {
    width: 100%;
    padding: 5px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-size: 12px;
  }
  select:focus, input[type="text"]:focus { outline: 1px solid var(--accent); }

  .confidence-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }
  .confidence-bar-fill { height: 100%; background: var(--success); border-radius: 2px; }

  .color-dot {
    display: inline-block;
    width: 12px; height: 12px;
    border-radius: 2px;
    border: 1px solid rgba(255,255,255,.2);
    vertical-align: middle;
    margin-right: 5px;
  }

  #panel-actions {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 12px;
    border-top: 1px solid var(--border);
  }

  .coords-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
    font-size: 11px;
  }
  .coord-item { background: var(--bg); border-radius: 3px; padding: 3px 6px; }
  .coord-item span { color: var(--muted); }

  /* ── add-element toolbar ── */
  #add-tool-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  #add-tool-row label { font-size: 11px; color: var(--muted); }
  #add-type-sel { width: auto; padding: 4px 6px; }
  #add-class-sel { width: auto; padding: 4px 6px; }

  .mode-active { background: var(--warn) !important; color: var(--bg) !important; border-color: var(--warn) !important; }

  #loading-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.6);
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
    font-size: 15px;
    color: var(--text);
  }
  #loading-overlay.hidden { display: none; }

  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin-right: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading-overlay" class="hidden">
  <div class="spinner"></div>
  <span id="loading-msg">Running inference…</span>
</div>

<!-- Toolbar -->
<div id="toolbar">
  <h1>⬛ Floorplan Viewer</h1>
  <div class="sep"></div>

  <!-- Load from file -->
  <button onclick="triggerImagePick()">Load Image</button>
  <button onclick="triggerJsonPick()">Load JSON</button>
  <input type="file" id="img-pick"  accept="image/*"   style="display:none" onchange="onImageFile(event)">
  <input type="file" id="json-pick" accept=".json"     style="display:none" onchange="onJsonFile(event)">

  <!-- Inference (requires server) -->
  <button class="primary" id="btn-infer" onclick="runInfer()" title="POST to /infer">Run Inference</button>

  <div class="sep"></div>

  <!-- Add element mode -->
  <div id="add-tool-row">
    <label>Add:</label>
    <select id="add-type-sel" onchange="updateAddClassOptions()">
      <option value="wall">Wall</option>
      <option value="room">Room</option>
      <option value="icon">Icon</option>
    </select>
    <select id="add-class-sel"></select>
    <button id="btn-draw" onclick="toggleDrawMode()">Draw Rect</button>
  </div>

  <div class="sep"></div>

  <button onclick="undo()" id="btn-undo" disabled>↩ Undo</button>
  <button onclick="redo()" id="btn-redo" disabled>↪ Redo</button>

  <div class="sep"></div>

  <button onclick="zoomBy(1.2)">＋</button>
  <span id="zoom-display">100%</span>
  <button onclick="zoomBy(1/1.2)">－</button>
  <button onclick="resetView()">Fit</button>

  <div class="sep"></div>

  <button class="primary" onclick="exportJSON()">Export JSON</button>
  <button onclick="saveToServer()">Save to Server</button>

  <span id="status-bar">No floorplan loaded</span>
</div>

<!-- Main layout -->
<div id="main">

  <!-- Left: element list -->
  <div id="sidebar">
    <div id="sidebar-header">
      <span>Elements (<span id="elem-count">0</span>)</span>
      <input id="elem-search" type="text" placeholder="Search…" oninput="renderList()">
      <div id="filter-row">
        <button class="filter-btn active" data-f="all"  onclick="setFilter('all')">All</button>
        <button class="filter-btn"        data-f="wall" onclick="setFilter('wall')">Walls</button>
        <button class="filter-btn"        data-f="room" onclick="setFilter('room')">Rooms</button>
        <button class="filter-btn"        data-f="icon" onclick="setFilter('icon')">Icons</button>
      </div>
    </div>
    <div id="elem-list"></div>
  </div>

  <!-- Center: image + SVG -->
  <div id="viewer-wrap" id="viewer-wrap"
       onwheel="onWheel(event)"
       onmousedown="onViewerMouseDown(event)"
       onmousemove="onViewerMouseMove(event)"
       onmouseup="onViewerMouseUp(event)">

    <div id="drop-zone">
      <div class="icon">🗺️</div>
      <p>Drag & drop a floorplan image here<br>or use <span>Load Image</span> to begin</p>
      <p style="font-size:11px; margin-top:4px">Then load or run inference to see detections</p>
    </div>

    <div id="canvas-container">
      <img id="floorplan-img" alt="">
      <svg id="svg-overlay"></svg>
    </div>
  </div>

  <!-- Right: properties panel -->
  <div id="panel">
    <div id="panel-header">Properties</div>
    <div id="panel-body">
      <div id="no-selection">Click an element to inspect or edit it</div>
      <div id="selection-content" style="display:none">

        <div class="field">
          <label>ID</label>
          <div class="field-value" id="prop-id" style="font-size:11px; color:var(--muted)"></div>
        </div>

        <div class="field">
          <label>Type</label>
          <div class="field-value" id="prop-type"></div>
        </div>

        <div class="field">
          <label>Class</label>
          <select id="prop-class" onchange="onClassChange()"></select>
        </div>

        <div class="field">
          <label>Confidence</label>
          <div class="field-value" id="prop-conf">—</div>
          <div class="confidence-bar"><div class="confidence-bar-fill" id="conf-bar" style="width:0%"></div></div>
        </div>

        <div class="field">
          <label>Bounding Box</label>
          <div class="coords-grid" id="prop-bbox"></div>
        </div>

        <div class="field">
          <label>Vertices</label>
          <div class="field-value" id="prop-verts" style="font-size:11px;color:var(--muted)"></div>
        </div>

      </div>
    </div>
    <div id="panel-actions">
      <button class="danger" id="btn-delete" onclick="deleteSelected()" disabled>Delete Selected</button>
      <button id="btn-deselect" onclick="deselect()" disabled>Deselect</button>
    </div>
  </div>

</div><!-- #main -->

<script>
// ══════════════════════════════════════════════════════════════════════════════
// State
// ══════════════════════════════════════════════════════════════════════════════
let schema       = null;    // current working schema (mutable)
let selectedId   = null;
let filterType   = 'all';
let scale        = 1;
let panX         = 0, panY = 0;
let imgW         = 0, imgH = 0;
let isPanning    = false;
let panStart     = {x:0, y:0};
let drawMode     = false;
let drawStart    = null;
let drawRect     = null;       // SVG rect while drawing
let dragHandle   = null;       // { elemId, cornerIdx, startX, startY, origPoly }
let undoStack    = [];
let redoStack    = [];

const SERVER = '';  // same origin

// ══════════════════════════════════════════════════════════════════════════════
// Label / colour look-up (merged from schema at load time)
// ══════════════════════════════════════════════════════════════════════════════
const DEFAULT_LABELS = {
  room: {0:"Background",1:"Outdoor",2:"Wall",3:"Kitchen",4:"LivingRoom",
         5:"Bedroom",6:"Bath",7:"Entry",8:"Railing",9:"Storage",10:"Garage",11:"Room"},
  icon: {0:"Empty",1:"Window",2:"Door",3:"Closet",4:"Appliance",5:"Toilet",
         6:"Sink",7:"SaunaBench",8:"Fireplace",9:"Bathtub",10:"Chimney"},
  wall: {2:"Wall",8:"Railing"},
};
const DEFAULT_COLORS = {
  room: {0:"#DCDCDC",1:"#DCDCDC",2:"#1a1a1a",3:"#fdb462",4:"#8dd3c7",5:"#b3de69",
         6:"#fccde5",7:"#80b1d3",8:"#808080",9:"#696969",10:"#577a4d",11:"#ffffb3"},
  icon: {0:"transparent",1:"#a0d4e8",2:"#c8764a",3:"#d4c5a9",4:"#ffcc44",5:"#e8c4e0",
         6:"#a4c8dc",7:"#c8a478",8:"#e85c2c",9:"#dce8f0",10:"#888888"},
};

let LABELS = JSON.parse(JSON.stringify(DEFAULT_LABELS));
let COLORS  = JSON.parse(JSON.stringify(DEFAULT_COLORS));

function getColor(elem) {
  if (elem.color) return elem.color;
  const t = elem.type;
  const c = String(elem.class_idx);
  if (t === 'wall')  return (COLORS.room[c] || '#888');
  if (t === 'room')  return (COLORS.room[c] || '#888');
  return (COLORS.icon[c] || '#888');
}

function getLabel(elem) {
  const t = elem.type;
  const c = String(elem.class_idx);
  if (t === 'wall')  return LABELS.wall[c] || LABELS.room[c] || `wall-${c}`;
  if (t === 'room')  return LABELS.room[c] || `room-${c}`;
  return LABELS.icon[c] || `icon-${c}`;
}

// ══════════════════════════════════════════════════════════════════════════════
// File loading
// ══════════════════════════════════════════════════════════════════════════════
function triggerImagePick() { document.getElementById('img-pick').click(); }
function triggerJsonPick()  { document.getElementById('json-pick').click(); }

function onImageFile(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  loadImageURL(url);
  ev.target.value = '';
}

function loadImageURL(url) {
  const img = document.getElementById('floorplan-img');
  img.onload = () => {
    imgW = img.naturalWidth;
    imgH = img.naturalHeight;
    const svg = document.getElementById('svg-overlay');
    svg.setAttribute('width',  imgW);
    svg.setAttribute('height', imgH);
    svg.setAttribute('viewBox', `0 0 ${imgW} ${imgH}`);
    document.getElementById('drop-zone').classList.add('hidden');
    resetView();
    if (schema) renderAll();
    setStatus(`Image loaded: ${imgW}×${imgH}`);
  };
  img.src = url;
}

function onJsonFile(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      ingestSchema(JSON.parse(e.target.result));
    } catch(err) {
      alert('Invalid JSON: ' + err.message);
    }
  };
  reader.readAsText(file);
  ev.target.value = '';
}

function ingestSchema(s) {
  pushUndo();
  schema = s;
  if (s.labels) {
    if (s.labels.room) LABELS.room = Object.assign({}, DEFAULT_LABELS.room, s.labels.room);
    if (s.labels.icon) LABELS.icon = Object.assign({}, DEFAULT_LABELS.icon, s.labels.icon);
    if (s.labels.wall) LABELS.wall = Object.assign({}, DEFAULT_LABELS.wall, s.labels.wall);
  }
  if (s.colors) {
    if (s.colors.room) COLORS.room = Object.assign({}, DEFAULT_COLORS.room, s.colors.room);
    if (s.colors.icon) COLORS.icon = Object.assign({}, DEFAULT_COLORS.icon, s.colors.icon);
  }
  selectedId = null;
  renderAll();
  updateAddClassOptions();
  setStatus(`Schema loaded — ${s.elements.length} elements`);
}

// ══════════════════════════════════════════════════════════════════════════════
// Server inference
// ══════════════════════════════════════════════════════════════════════════════
async function runInfer() {
  const imgEl = document.getElementById('floorplan-img');
  if (!imgEl.src || imgEl.src === window.location.href) {
    alert('Load an image first.');
    return;
  }

  showLoading('Running inference…');
  try {
    const resp = await fetch(imgEl.src);
    const blob  = await resp.blob();
    const fd    = new FormData();
    fd.append('image', blob, 'floorplan.png');

    const res = await fetch(SERVER + '/infer', { method: 'POST', body: fd });
    const data = await res.json();
    if (data.error) { alert('Inference error: ' + data.error); return; }

    if (data.image_b64) {
      loadImageURL('data:image/png;base64,' + data.image_b64);
    }
    ingestSchema(data.schema);
  } catch(e) {
    alert('Could not reach server: ' + e.message +
          '\n\nMake sure you started server.py and that the model is loaded.');
  } finally {
    hideLoading();
  }
}

async function saveToServer() {
  if (!schema) { alert('Nothing to save.'); return; }
  const path = prompt('Save path on server:', 'output_schema.json');
  if (!path) return;
  const res  = await fetch(SERVER + '/export', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({schema, path}),
  });
  const data = await res.json();
  if (data.saved) setStatus('Saved to: ' + data.path);
  else alert('Save failed: ' + (data.error || 'unknown'));
}

// ══════════════════════════════════════════════════════════════════════════════
// Render
// ══════════════════════════════════════════════════════════════════════════════
function renderAll() {
  renderSVG();
  renderList();
  updateElemCount();
}

function renderSVG() {
  const svg = document.getElementById('svg-overlay');
  svg.innerHTML = '';
  if (!schema) return;

  for (const elem of schema.elements) {
    if (!elem.polygon || elem.polygon.length < 3) continue;
    const pts = elem.polygon.map(p => p.join(',')).join(' ');
    const color = getColor(elem);

    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    poly.setAttribute('points', pts);
    poly.setAttribute('fill',   color);
    poly.setAttribute('stroke', color === '#1a1a1a' ? '#555' : color);
    poly.classList.add('elem-poly');
    if (elem.id === selectedId) poly.classList.add('selected');
    poly.dataset.id = elem.id;
    poly.addEventListener('click', e => { e.stopPropagation(); selectElem(elem.id); });
    svg.appendChild(poly);
  }

  // Drag handles for selected (only 4-corner elements)
  if (selectedId) {
    const elem = getElem(selectedId);
    if (elem && elem.polygon.length === 4) {
      renderHandles(svg, elem);
    }
  }
}

function renderHandles(svg, elem) {
  elem.polygon.forEach((pt, i) => {
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', pt[0]);
    c.setAttribute('cy', pt[1]);
    c.setAttribute('r',  5);
    c.classList.add('handle');
    c.dataset.elemId = elem.id;
    c.dataset.corner = i;
    c.addEventListener('mousedown', e => { e.stopPropagation(); startDragHandle(e, elem.id, i); });
    svg.appendChild(c);
  });
}

function renderList() {
  const list    = document.getElementById('elem-list');
  const query   = document.getElementById('elem-search').value.toLowerCase();
  list.innerHTML = '';
  if (!schema) return;

  const groups = { wall: [], room: [], icon: [] };
  for (const elem of schema.elements) {
    if (filterType !== 'all' && elem.type !== filterType) continue;
    const label = getLabel(elem);
    if (query && !label.toLowerCase().includes(query) && !elem.id.includes(query)) continue;
    groups[elem.type]?.push(elem);
  }

  for (const [gtype, elems] of Object.entries(groups)) {
    if (!elems.length) continue;
    const hdr = document.createElement('div');
    hdr.className = 'list-group-header';
    hdr.textContent = `${gtype.toUpperCase()} (${elems.length})`;
    list.appendChild(hdr);

    for (const elem of elems) {
      const row   = document.createElement('div');
      row.className = 'list-item' + (elem.id === selectedId ? ' selected' : '');
      row.dataset.id = elem.id;

      const sw = document.createElement('div');
      sw.className = 'list-swatch';
      sw.style.background = getColor(elem);

      const lbl = document.createElement('div');
      lbl.className = 'list-label';
      lbl.textContent = getLabel(elem);

      row.appendChild(sw);
      row.appendChild(lbl);

      if (elem.confidence != null) {
        const cf = document.createElement('div');
        cf.className = 'list-conf';
        cf.textContent = (elem.confidence * 100).toFixed(0) + '%';
        row.appendChild(cf);
      }

      row.addEventListener('click', () => selectElem(elem.id));
      list.appendChild(row);
    }
  }
}

function updateElemCount() {
  document.getElementById('elem-count').textContent = schema ? schema.elements.length : 0;
}

// ══════════════════════════════════════════════════════════════════════════════
// Selection
// ══════════════════════════════════════════════════════════════════════════════
function selectElem(id) {
  selectedId = id;
  renderSVG();
  renderList();
  updatePanel();
  document.getElementById('btn-delete').disabled  = false;
  document.getElementById('btn-deselect').disabled = false;
  scrollListTo(id);
}

function deselect() {
  selectedId = null;
  renderSVG();
  renderList();
  document.getElementById('no-selection').style.display = '';
  document.getElementById('selection-content').style.display = 'none';
  document.getElementById('btn-delete').disabled  = true;
  document.getElementById('btn-deselect').disabled = true;
}

function scrollListTo(id) {
  const el = document.querySelector(`#elem-list [data-id="${id}"]`);
  if (el) el.scrollIntoView({block:'nearest'});
}

function getElem(id) {
  return schema?.elements.find(e => e.id === id);
}

function updatePanel() {
  const elem = getElem(selectedId);
  if (!elem) { deselect(); return; }
  document.getElementById('no-selection').style.display = 'none';
  document.getElementById('selection-content').style.display = '';

  document.getElementById('prop-id').textContent   = elem.id;
  document.getElementById('prop-type').innerHTML   =
    `<span class="color-dot" style="background:${getColor(elem)}"></span>${elem.type}`;

  // class dropdown
  const sel = document.getElementById('prop-class');
  sel.innerHTML = '';
  const labelMap = elem.type === 'icon' ? LABELS.icon
                 : elem.type === 'wall' ? {...LABELS.wall, ...LABELS.room}
                 : LABELS.room;
  for (const [k, v] of Object.entries(labelMap)) {
    if (v === 'Background' || v === 'Empty') continue;
    const opt = document.createElement('option');
    opt.value = k;
    opt.textContent = v;
    if (parseInt(k) === elem.class_idx) opt.selected = true;
    sel.appendChild(opt);
  }

  // confidence
  const conf = elem.confidence;
  document.getElementById('prop-conf').textContent = conf != null ? (conf * 100).toFixed(1) + '%' : '—';
  document.getElementById('conf-bar').style.width  = conf != null ? (conf * 100) + '%' : '0%';

  // bbox
  const xs  = elem.polygon.map(p => p[0]);
  const ys  = elem.polygon.map(p => p[1]);
  const x1 = Math.min(...xs), x2 = Math.max(...xs);
  const y1  = Math.min(...ys), y2 = Math.max(...ys);
  document.getElementById('prop-bbox').innerHTML = `
    <div class="coord-item"><span>x1</span> ${Math.round(x1)}</div>
    <div class="coord-item"><span>y1</span> ${Math.round(y1)}</div>
    <div class="coord-item"><span>x2</span> ${Math.round(x2)}</div>
    <div class="coord-item"><span>y2</span> ${Math.round(y2)}</div>
    <div class="coord-item"><span>w</span> ${Math.round(x2-x1)}</div>
    <div class="coord-item"><span>h</span> ${Math.round(y2-y1)}</div>
  `;

  document.getElementById('prop-verts').textContent = `${elem.polygon.length} vertices`;
}

function onClassChange() {
  if (!selectedId) return;
  const elem = getElem(selectedId);
  if (!elem) return;
  pushUndo();
  const newClass = parseInt(document.getElementById('prop-class').value);
  elem.class_idx = newClass;
  elem.label     = getLabel(elem);
  elem.color     = null; // re-derive from class
  renderAll();
  selectElem(selectedId);
}

// ══════════════════════════════════════════════════════════════════════════════
// Delete
// ══════════════════════════════════════════════════════════════════════════════
function deleteSelected() {
  if (!selectedId || !schema) return;
  pushUndo();
  schema.elements = schema.elements.filter(e => e.id !== selectedId);
  selectedId = null;
  renderAll();
  deselect();
  setStatus('Element deleted');
}

document.addEventListener('keydown', e => {
  if ((e.key === 'Delete' || e.key === 'Backspace') &&
      document.activeElement.tagName !== 'INPUT' &&
      document.activeElement.tagName !== 'SELECT') {
    if (selectedId) deleteSelected();
  }
  if (e.ctrlKey && e.key === 'z') undo();
  if (e.ctrlKey && e.key === 'y') redo();
  if (e.key === 'Escape') { deselect(); exitDrawMode(); }
});

// Click outside deselects
document.getElementById('viewer-wrap').addEventListener('click', e => {
  if (e.target.id === 'viewer-wrap' || e.target.id === 'canvas-container' ||
      e.target.id === 'floorplan-img') {
    if (!drawMode) deselect();
  }
});

// ══════════════════════════════════════════════════════════════════════════════
// Zoom / Pan
// ══════════════════════════════════════════════════════════════════════════════
function applyTransform() {
  const cc = document.getElementById('canvas-container');
  cc.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  document.getElementById('zoom-display').textContent = Math.round(scale * 100) + '%';
}

function zoomBy(factor) {
  const wrap = document.getElementById('viewer-wrap');
  const cx   = wrap.clientWidth  / 2;
  const cy   = wrap.clientHeight / 2;
  const oldScale = scale;
  scale = Math.max(0.05, Math.min(20, scale * factor));
  panX = cx - (cx - panX) * (scale / oldScale);
  panY = cy - (cy - panY) * (scale / oldScale);
  applyTransform();
}

function resetView() {
  if (!imgW) return;
  const wrap   = document.getElementById('viewer-wrap');
  const ww     = wrap.clientWidth  - 20;
  const wh     = wrap.clientHeight - 20;
  scale = Math.min(ww / imgW, wh / imgH, 1);
  panX  = (wrap.clientWidth  - imgW * scale) / 2;
  panY  = (wrap.clientHeight - imgH * scale) / 2;
  applyTransform();
}

function onWheel(e) {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 1/1.1;
  const wrap   = document.getElementById('viewer-wrap');
  const rect   = wrap.getBoundingClientRect();
  const mx     = e.clientX - rect.left;
  const my     = e.clientY - rect.top;
  const old    = scale;
  scale        = Math.max(0.05, Math.min(20, scale * factor));
  panX         = mx - (mx - panX) * (scale / old);
  panY         = my - (my - panY) * (scale / old);
  applyTransform();
}

// ── Pan + drag handle + draw ──
let _panStart = null;

function viewerToSVG(clientX, clientY) {
  const wrap = document.getElementById('viewer-wrap').getBoundingClientRect();
  return {
    x: (clientX - wrap.left - panX) / scale,
    y: (clientY - wrap.top  - panY) / scale,
  };
}

function onViewerMouseDown(e) {
  if (e.target.classList.contains('handle')) return;  // handle has its own listener

  if (drawMode && e.button === 0) {
    const p = viewerToSVG(e.clientX, e.clientY);
    drawStart = p;
    return;
  }

  if (e.button === 1 || e.button === 0 && !e.target.classList.contains('elem-poly')) {
    isPanning  = true;
    _panStart  = { x: e.clientX - panX, y: e.clientY - panY };
    document.getElementById('viewer-wrap').style.cursor = 'grabbing';
  }
}

function onViewerMouseMove(e) {
  if (dragHandle) {
    moveDragHandle(e);
    return;
  }
  if (drawMode && drawStart) {
    updateDrawRect(e);
    return;
  }
  if (isPanning && _panStart) {
    panX = e.clientX - _panStart.x;
    panY = e.clientY - _panStart.y;
    applyTransform();
  }
}

function onViewerMouseUp(e) {
  if (dragHandle) { commitDragHandle(); return; }
  if (drawMode && drawStart) { commitDraw(e); return; }
  isPanning = false;
  _panStart  = null;
  document.getElementById('viewer-wrap').style.cursor = 'default';
}

// ══════════════════════════════════════════════════════════════════════════════
// Handle drag (corner move)
// ══════════════════════════════════════════════════════════════════════════════
function startDragHandle(e, elemId, cornerIdx) {
  const p = viewerToSVG(e.clientX, e.clientY);
  const elem = getElem(elemId);
  dragHandle = {
    elemId,
    cornerIdx,
    origPoly: elem.polygon.map(pt => [...pt]),
  };
  document.addEventListener('mousemove', onDocMouseMove);
  document.addEventListener('mouseup',   onDocMouseUp);
}

function onDocMouseMove(e) {
  if (!dragHandle) return;
  const p    = viewerToSVG(e.clientX, e.clientY);
  const elem = getElem(dragHandle.elemId);
  elem.polygon[dragHandle.cornerIdx] = [Math.round(p.x), Math.round(p.y)];

  // Mirror for axis-aligned rectangles: keep it rectangular
  const ci  = dragHandle.cornerIdx;
  const opp = (ci + 2) % 4;        // opposite corner stays
  const adj1 = (ci + 1) % 4;
  const adj2 = (ci + 3) % 4;
  // update adjacent corners to keep rectangle
  if (elem.polygon.length === 4) {
    const ox = elem.polygon[opp][0], oy = elem.polygon[opp][1];
    const nx = elem.polygon[ci][0],  ny = elem.polygon[ci][1];
    if (ci === 0) { // up-left
      elem.polygon[1] = [ox, ny];
      elem.polygon[3] = [nx, oy];
    } else if (ci === 1) { // up-right
      elem.polygon[0] = [ox, ny];
      elem.polygon[2] = [nx, oy];
    } else if (ci === 2) { // down-right
      elem.polygon[3] = [ox, ny];
      elem.polygon[1] = [nx, oy];
    } else {  // down-left
      elem.polygon[2] = [ox, ny];
      elem.polygon[0] = [nx, oy];
    }
  }

  renderSVG();
  updatePanel();
}

function onDocMouseUp() {
  if (dragHandle) { pushUndo(); dragHandle = null; }
  document.removeEventListener('mousemove', onDocMouseMove);
  document.removeEventListener('mouseup',   onDocMouseUp);
}

function commitDragHandle() {
  dragHandle = null;
  renderSVG();
}

// ══════════════════════════════════════════════════════════════════════════════
// Draw new element (rectangle)
// ══════════════════════════════════════════════════════════════════════════════
function toggleDrawMode() {
  drawMode = !drawMode;
  const btn = document.getElementById('btn-draw');
  if (drawMode) {
    btn.classList.add('mode-active');
    setStatus('Draw mode: click and drag on the floorplan to create a rectangle. ESC to cancel.');
  } else {
    exitDrawMode();
  }
}

function exitDrawMode() {
  drawMode  = false;
  drawStart = null;
  if (drawRect) { drawRect.remove(); drawRect = null; }
  document.getElementById('btn-draw').classList.remove('mode-active');
}

function updateDrawRect(e) {
  const p = viewerToSVG(e.clientX, e.clientY);
  const svg = document.getElementById('svg-overlay');
  const x = Math.min(drawStart.x, p.x);
  const y = Math.min(drawStart.y, p.y);
  const w = Math.abs(p.x - drawStart.x);
  const h = Math.abs(p.y - drawStart.y);
  if (!drawRect) {
    drawRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    drawRect.setAttribute('fill',         'rgba(137,180,250,0.2)');
    drawRect.setAttribute('stroke',       '#89b4fa');
    drawRect.setAttribute('stroke-width', '1.5');
    drawRect.setAttribute('stroke-dasharray', '4 2');
    svg.appendChild(drawRect);
  }
  drawRect.setAttribute('x', x);
  drawRect.setAttribute('y', y);
  drawRect.setAttribute('width',  w);
  drawRect.setAttribute('height', h);
}

function commitDraw(e) {
  if (!drawRect || !drawStart) { exitDrawMode(); return; }
  const p  = viewerToSVG(e.clientX, e.clientY);
  const x1 = Math.min(drawStart.x, p.x), x2 = Math.max(drawStart.x, p.x);
  const y1 = Math.min(drawStart.y, p.y), y2 = Math.max(drawStart.y, p.y);
  drawRect.remove(); drawRect = null;
  drawStart = null;

  if (Math.abs(x2 - x1) < 5 || Math.abs(y2 - y1) < 5) return; // too small

  const etype  = document.getElementById('add-type-sel').value;
  const cidx   = parseInt(document.getElementById('add-class-sel').value);
  const label  = etype === 'icon' ? ICON_LABELS[cidx] : ROOM_LABELS[cidx];

  if (!schema) schema = { version:'1.0', meta:{width:imgW,height:imgH}, elements:[] };

  const counter = schema.elements.filter(e => e.type === etype).length;
  const newElem = {
    id:         `${etype}-new-${Date.now()}`,
    type:       etype,
    class_idx:  cidx,
    label:      label || `class_${cidx}`,
    color:      null,
    polygon:    [[x1,y1],[x2,y1],[x2,y2],[x1,y2]].map(p => [Math.round(p[0]),Math.round(p[1])]),
    confidence: null,
  };

  pushUndo();
  schema.elements.push(newElem);
  renderAll();
  selectElem(newElem.id);
  setStatus(`Added new ${etype}: class ${label}`);
}

// ══════════════════════════════════════════════════════════════════════════════
// Add-tool class options
// ══════════════════════════════════════════════════════════════════════════════
function updateAddClassOptions() {
  const t   = document.getElementById('add-type-sel').value;
  const sel = document.getElementById('add-class-sel');
  sel.innerHTML = '';
  const map = t === 'icon' ? LABELS.icon : LABELS.room;
  for (const [k, v] of Object.entries(map)) {
    if (v === 'Background' || v === 'Empty') continue;
    const opt = document.createElement('option');
    opt.value = k; opt.textContent = v;
    sel.appendChild(opt);
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// Undo / Redo
// ══════════════════════════════════════════════════════════════════════════════
function pushUndo() {
  undoStack.push(JSON.stringify(schema));
  redoStack = [];
  if (undoStack.length > 50) undoStack.shift();
  document.getElementById('btn-undo').disabled = false;
  document.getElementById('btn-redo').disabled = true;
}

function undo() {
  if (!undoStack.length) return;
  redoStack.push(JSON.stringify(schema));
  schema = JSON.parse(undoStack.pop());
  renderAll();
  deselect();
  document.getElementById('btn-undo').disabled = !undoStack.length;
  document.getElementById('btn-redo').disabled = false;
  setStatus('Undo');
}

function redo() {
  if (!redoStack.length) return;
  undoStack.push(JSON.stringify(schema));
  schema = JSON.parse(redoStack.pop());
  renderAll();
  deselect();
  document.getElementById('btn-undo').disabled = false;
  document.getElementById('btn-redo').disabled = !redoStack.length;
  setStatus('Redo');
}

// ══════════════════════════════════════════════════════════════════════════════
// Filter
// ══════════════════════════════════════════════════════════════════════════════
function setFilter(f) {
  filterType = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.filter-btn[data-f="${f}"]`).classList.add('active');
  renderList();
}

// ══════════════════════════════════════════════════════════════════════════════
// Export
// ══════════════════════════════════════════════════════════════════════════════
function exportJSON() {
  if (!schema) { alert('No schema loaded.'); return; }
  const blob = new Blob([JSON.stringify(schema, null, 2)], {type: 'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'floorplan_corrected.json';
  a.click();
  URL.revokeObjectURL(url);
  setStatus('Exported floorplan_corrected.json');
}

// ══════════════════════════════════════════════════════════════════════════════
// Drag & drop on viewer
// ══════════════════════════════════════════════════════════════════════════════
const vw = document.getElementById('viewer-wrap');
vw.addEventListener('dragover', e => { e.preventDefault(); });
vw.addEventListener('drop', e => {
  e.preventDefault();
  for (const file of e.dataTransfer.files) {
    if (file.type.startsWith('image/')) {
      loadImageURL(URL.createObjectURL(file));
    } else if (file.name.endsWith('.json')) {
      const reader = new FileReader();
      reader.onload = ev => { try { ingestSchema(JSON.parse(ev.target.result)); } catch(err) { alert('Bad JSON'); } };
      reader.readAsText(file);
    }
  }
});

// ══════════════════════════════════════════════════════════════════════════════
// Utility
// ══════════════════════════════════════════════════════════════════════════════
function setStatus(msg) {
  document.getElementById('status-bar').textContent = msg;
}

function showLoading(msg) {
  document.getElementById('loading-msg').textContent = msg;
  document.getElementById('loading-overlay').classList.remove('hidden');
}

function hideLoading() {
  document.getElementById('loading-overlay').classList.add('hidden');
}

// Init
updateAddClassOptions();
</script>
